name: Refresh static content
on:
  schedule: [{ cron: '17 * * * *' }]
  workflow_dispatch: {}
  repository_dispatch: { types: [notion-content-updated] }
permissions: { actions: write, contents: read }
jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with: { script: "await github.rest.actions.createWorkflowDispatch({owner:context.repo.owner,repo:context.repo.repo,workflow_id:'deploy-pages.yml',ref:'main'})" }
